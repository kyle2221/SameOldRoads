name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend deps
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
        env:
          # Build-time only — no real keys in CI.
          VITE_API_BASE: /api

      - name: Install backend deps
        run: cd server && npm ci

      - name: Boot backend smoke test
        run: |
          cd server
          node src/index.js &
          SERVER_PID=$!
          # Give it a beat to boot
          sleep 2
          # Hit health endpoint
          curl -sf http://127.0.0.1:8787/api/health | grep -q '"status":"ok"' || (echo "Health check failed" && kill $SERVER_PID && exit 1)
          # Hit root endpoint
          curl -sf http://127.0.0.1:8787/ | grep -q 'SameOldRoads API' || (echo "Root check failed" && kill $SERVER_PID && exit 1)
          kill $SERVER_PID
